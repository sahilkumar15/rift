# ═══════════════════════════════════════════════════════════════════════════════
# RIFT — Reinforced Identity-Gap Faithfulness Testing
#
# Default train command:
#   bash scripts/run_rift.sh --gpus 0,1,2,3 --mode train --horizon 4
#
# CIFT is frozen. RIFT trains only the explanation-repair RL policy.
# ═══════════════════════════════════════════════════════════════════════════════

seed: 3407
device: cuda
torch_home: ""

detector:
  type: cift
  backbone: convnextv2_base
  cift_root: /scratch/sahil/projects/img_deepfake/code/ImageDifussionFake
  cift_config: configs/diffusionfake_mixed.yaml
  cift_ckpt: /scratch/sahil/projects/img_deepfake/code/ImageDifussionFake/experiments/Mix5_AllDomains_v5/ckpt/best-eer-epoch=34.ckpt
  strict_identity_gap: true

checkpoints:
  glob: null
  explicit: []

dataset:
  name: ffpp_rela
  format: csv_split

  # Default audit/gates CSV.
  split_csv: /scratch/sahil/projects/img_deepfake/code/rift/data/slices/rift_ffpp_rela_c23.csv

  # null = use all rows for audit/gates.
  max_items: null

  ffpp_rela:
    data_root: /scratch/sahil/projects/img_deepfake/datasets/ffpp
    data_types: ""
    compressions: c23
    num_frames: 50
    methods:
      - youtube
      - Deepfakes
      - Face2Face
      - FaceSwap
      - NeuralTextures
    has_mask: false
    balance: true
    relation_data: true
    use_splits: true
    strict_splits: true
    splits_dirname: splits
    csv_dirname: split_csv2
    random_patch: null

  zero_shot:
    celeb_df:
      data_root: /scratch/sahil/projects/img_deepfake/datasets/celebdf
      split_csv: /scratch/sahil/projects/img_deepfake/datasets/celebdf/split_csv2/celeb_df_v2_test.csv
    dfd:
      data_root: /scratch/sahil/projects/img_deepfake/datasets/dfd
      split_csv: /scratch/sahil/projects/img_deepfake/datasets/dfd/split_csv2/dfd_test.csv
    wild_deepfake:
      data_root: /scratch/sahil/projects/img_deepfake/datasets/wild_deepfake
      split_csv: /scratch/sahil/projects/img_deepfake/datasets/wild_deepfake/split_csv2/wilddeepfake_test.csv
    diffswap:
      data_root: /scratch/sahil/projects/img_deepfake/datasets/diffswap
      split_csv: /scratch/sahil/projects/img_deepfake/datasets/diffswap/split_csv2/diffswap_test.csv

transform:
  image_size: 256
  mean: [0.5, 0.5, 0.5]
  std:  [0.5, 0.5, 0.5]

data:
  image_size: 256

  # Main RL train/val CSVs.
  # The launcher uses these automatically unless --csv / --val-csv is passed.
  train_csv: /scratch/sahil/projects/img_deepfake/code/rift/data/slices/rift_ffpp_train_c23_full.csv
  val_csv: /scratch/sahil/projects/img_deepfake/code/rift/data/slices/rift_ffpp_val_c23_full.csv

  strict_identity_gap: true

  # Per-GPU batch. With 4 GPUs, global batch = 16 * 4 = 64.
  batch_size: 64
  num_workers: 4
  prefetch_factor: 2
  pin_memory: true
  persistent_workers: true

  # Controlled training subset. Set null for full CSV.
  max_items: null
  val_max_items: null

intervention:
  mode: blur
  topk_frac: 0.12
  random_control: true

faithfulness:
  weights:
    w_delta: 1.0
    w_logit: 0.5
    w_sparsity: 0.3
    w_identity: 0.3
    w_perceptual: 0.2
    w_plausibility: 0.0
  delta_floor: 0.0
  logit_floor: 0.0

explainers:
  - random
  - gradcam_logit
  - cift_gap
  - rift_policy

rl:
  algo: ppo
  horizon: 4
  grid: 8
  hidden: 256
  feat_dim: 1024

  lr: 3.0e-05
  clip: 0.2
  entropy_coef: 0.01
  value_coef: 0.5

  # Keep 1 for speed with CIFT-heavy training.
  ppo_epochs: 5
  epochs: 30

  val_every: 2
  val_max_batches: 8

  protection: true
  reward_preset: full_rift
  cache_features: true

ablation:
  spec: configs/ablations_rift.yaml
  seeds: [0, 1, 2]
  blocks:
    block0_validity: true
    block1_method: true
    block2_audit: true
    block3_correlation: true
    block4_rl: true
  min_sep: 0.15
  headline_min_n: 15

wandb:
  enabled: false
  project: RIFT_ICLR
  entity: null
  group: rift_ffpp_c23
  name: null
  tags:
    - rift
    - faithfulness
    - identity-gap
    - audit
    - convnextv2_base
    - ffpp
    - c23
  mode: online
  log_model: false

# auto resumes from latest.pth if present.
# none starts fresh.
resume: auto

checkpoint:
  # Base folder. run_rift.sh will create a stable per-run folder:
  # outputs/ckpt/RIFT_ffpp_c23_ddp_h4_seed3407
  dir: outputs/ckpt
  metric: rift_score
  mode: max
  save_every: 1
  top_k: 3

amp:
  enabled: false

# ═══════════════════════════════════════════════════════════════════════════════
# EARLY STOPPING
# ═══════════════════════════════════════════════════════════════════════════════
early_stopping:
  monitor:   "val/rift_score"
  mode:      "max"
  patience:  8
  min_delta: 0.002

# ═══════════════════════════════════════════════════════════════════════════════
# CHECKPOINTING
# ═══════════════════════════════════════════════════════════════════════════════
checkpoint:
  # If dir is null, code uses: experiments/<experiment.name>/ckpt
  dir: null
  monitor:          "val/rift_score"
  mode:             "max"
  save_top_k:       3
  save_last:        true
  best_filename:    "rift-best-score-epoch={epoch:02d}"
  every_filename:   "rift-epoch={epoch:02d}"
  save_every:       1
  save_epochs:      []

# ═══════════════════════════════════════════════════════════════════════════════
# EXPERIMENT
# This controls:
#   1. experiments/<experiment.name>/
#   2. experiments/<experiment.name>/ckpt/
#   3. W&B run name when wandb.name is null
# ═══════════════════════════════════════════════════════════════════════════════
experiment:
  root_dir: "experiments"
  name: "RIFT_ffpp_c23_h4_full"

# ═══════════════════════════════════════════════════════════════════════════════
# ARTIFACTS / TABLES
# Null means the code saves under experiments/<experiment.name>/.
# ═══════════════════════════════════════════════════════════════════════════════
artifacts:
  table_csv: null
  per_cell_dir: null
  leaderboard_csv: null
  correlation_json: null
  correlation_input: null

# ═══════════════════════════════════════════════════════════════════════════════
# WEIGHTS & BIASES
# ═══════════════════════════════════════════════════════════════════════════════
wandb:
  enabled: true
  project:   "RIFT_ICLR27"
  entity:    null
  group:     "rift_ffpp_c23_full"
  name:      null
  tags:
    - "rift"
    - "faithfulness"
    - "identity-gap"
    - "rl-policy"
    - "cift-frozen"
    - "convnextv2_base"
    - "ffpp"
    - "c23"
    - "horizon4"
  notes: >
    RIFT trains an explanation-repair RL policy on top of a frozen CIFT detector.
    The goal is to audit and reinforce whether explanations are faithful to the
    donor-recipient identity-gap evidence. Active data: FF++ c23 relation split.
    Frozen detector: CIFT Mix5 checkpoint. RIFT policy is used for audit/repair;
    the CIFT detector graph itself is not changed.
  save_code: true
  log_model: false
  mode:      "online"

# auto resumes from experiments/<experiment.name>/ckpt/latest.pth if present.
# none starts fresh. A concrete .pth path resumes from that file.
resume: auto

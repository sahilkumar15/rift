seed: 3407
device: cuda
torch_home: ''
detector:
  type: cift
  backbone: convnextv2_base
  cift_ckpt: /scratch/sahil/projects/img_deepfake/code/ImageDifussionFake/experiments/Mix5_AllDomains_v5/ckpt/best-eer-epoch=34.ckpt
  cift_config: configs/diffusionfake_mixed.yaml
  cift_root: /scratch/sahil/projects/img_deepfake/code/ImageDifussionFake
  strict_identity_gap: true
checkpoints:
  glob: null
  explicit: []
dataset:
  name: ffpp_rela
  format: csv_split
  split_csv: /scratch/sahil/projects/img_deepfake/code/rift/data/slices/rift_ffpp_rela.csv
  max_items: 200
  ffpp_rela:
    data_root: /scratch/sahil/projects/img_deepfake/datasets/ffpp
    compressions: c23
    num_frames: 50
    methods:
    - youtube
    - Deepfakes
    - Face2Face
    - FaceSwap
    - NeuralTextures
    relation_data: true
    use_splits: true
    splits_dirname: splits
    csv_dirname: split_csv2
  zero_shot:
    celeb_df:
      data_root: /scratch/sahil/projects/img_deepfake/datasets/celebdf
      split_csv: /scratch/sahil/projects/img_deepfake/datasets/celebdf/split_csv2/celeb_df_v2_test.csv
    dfd:
      data_root: /scratch/sahil/projects/img_deepfake/datasets/dfd
      split_csv: /scratch/sahil/projects/img_deepfake/datasets/dfd/split_csv2/dfd_test.csv
    wild_deepfake:
      data_root: /scratch/sahil/projects/img_deepfake/datasets/wild_deepfake
      split_csv: /scratch/sahil/projects/img_deepfake/datasets/wild_deepfake/split_csv2/wilddeepfake_test.csv
    diffswap:
      data_root: /scratch/sahil/projects/img_deepfake/datasets/diffswap
      split_csv: /scratch/sahil/projects/img_deepfake/datasets/diffswap/split_csv2/diffswap_test.csv
transform:
  image_size: 256
  mean:
  - 0.5
  - 0.5
  - 0.5
  std:
  - 0.5
  - 0.5
  - 0.5
data:
  num_workers: 4
  image_size: 256
  train_csv: /scratch/sahil/projects/img_deepfake/code/rift/data/slices/rift_ffpp_rela.csv
  val_csv: /scratch/sahil/projects/img_deepfake/code/rift/data/slices/rift_ffpp_rela.csv
  strict_identity_gap: true
intervention:
  mode: blur
  topk_frac: 0.12
  random_control: true
faithfulness:
  weights:
    w_delta: 1.0
    w_logit: 0.5
    w_sparsity: 0.3
    w_identity: 0.3
    w_perceptual: 0.2
    w_plausibility: 0.0
  delta_floor: 0.0
  logit_floor: 0.0
explainers:
- random
- gradcam_logit
- cift_gap
- annotation
- vlm_external
- rift_policy
rl:
  algo: ppo
  horizon: 4
  grid: 8
  hidden: 256
  lr: 3.0e-05
  clip: 0.2
  entropy_coef: 0.01
  value_coef: 0.5
  ppo_epochs: 4
  epochs: 30
  protection: true
ablation:
  spec: configs/ablations_rift.yaml
  seeds:
  - 0
  - 1
  - 2
  blocks:
    block0_validity: true
    block1_method: true
    block2_audit: true
    block3_correlation: true
    block4_rl: true
  min_sep: 0.15
  headline_min_n: 15
output:
  root: experiments
  name: RIFT_ffpp_audit
  table_csv: outputs/table_rift.csv
  per_cell_dir: outputs/cells
  leaderboard_csv: outputs/leaderboard.csv
  correlation_json: outputs/correlation.json
wandb:
  enabled: true
  project: RIFT_ICLR
  entity: null
  group: rift_ablations_ffpp
  name: null
  tags:
  - rift
  - faithfulness
  - identity-gap
  - audit
  - convnextv2_base
  - ffpp
  mode: online
  log_model: false
resume: auto
checkpoint:
  dir: outputs/ckpt
  metric: faithfulness_delta
  mode: max
  save_every: 10
  top_k: 3
amp:
  enabled: false
